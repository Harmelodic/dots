# Before configuring:
# - Use `English (UK, Macintosh)` keyboard profile in GNOME Settings, to swap @ and " and puts # on Alt GR-3
# - Then physically swap Windows/Super key and Left Alt key caps on the keyboard.

# For config syntax, do `man keyd`
[ids]

*

[main]

# Map the Alt Key to the Super/Meta key (layer)
leftalt = layer(meta)

# Map the Super/Meta key to the alt key (layer)
meta = layer(alt)
